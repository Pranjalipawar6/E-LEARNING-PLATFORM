<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
/* (keep your existing styles – same as before) */
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f4f6fb;
}
.container{
padding:30px;
max-width:800px;
margin:auto;
}
.page-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}
.back-btn{
text-decoration:none;
background:#4361ee;
color:white;
padding:8px 16px;
border-radius:8px;
transition:0.3s;
}
.back-btn:hover{
background:#3f37c9;
}
.quiz-card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-bottom:20px;
}
.quiz-card h3{
margin-bottom:15px;
}
.option{
display:block;
background:#f1f3ff;
padding:10px;
border-radius:8px;
margin-bottom:10px;
cursor:pointer;
transition:0.3s;
}
.option:hover{
background:#dfe4ff;
}
.btn{
background:#4361ee;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
font-size:15px;
transition:0.3s;
}
.btn:hover{
background:#3f37c9;
}
</style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <h2>Quiz</h2>
        <a href="student-dashboard.html" class="back-btn">⬅ Back</a>
    </div>
</div>
<script>
    async function loadQuizzes() {
        // FIX: use api/ prefix
        const res = await fetch('api/quizzes.php');
        const quizzes = await res.json();
        const container = document.querySelector('.container');
        if (!quizzes.length) {
            container.innerHTML += '<p class="no-results">No quizzes available.</p>';
            return;
        }
        let html = `<div class="page-header"><h2>Quizzes</h2><a href="student-dashboard.html" class="back-btn">⬅ Back</a></div>`;
        quizzes.forEach((q, idx) => {
            html += `
                <div class="quiz-card" id="quiz_${q.id}">
                    <h3>${idx+1}. ${q.question}</h3>
                    ${[1,2,3,4].map(opt => `
                        <label class="option">
                            <input type="radio" name="q${q.id}" value="${opt}" ${q.attempted ? 'disabled' : ''}>
                            ${q['option'+opt]}
                        </label>
                    `).join('')}
                    ${!q.attempted ? `<button class="btn" onclick="submitQuiz(${q.id})">Submit Answer</button>` : `<span class="badge completed">Attempted - ${q.is_correct ? 'Correct' : 'Incorrect'}</span>`}
                </div>
            `;
        });
        container.innerHTML = html;
    }
    async function submitQuiz(quizId) {
        const selected = document.querySelector(`input[name="q${quizId}"]:checked`);
        if (!selected) return alert('Select an answer');
        // FIX: use api/ prefix
        const res = await fetch('api/quizzes.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'submit', quiz_id: quizId, selected_answer: parseInt(selected.value) })
        });
        const data = await res.json();
        alert(data.is_correct ? 'Correct!' : 'Wrong answer!');
        location.reload();
    }
    document.addEventListener('DOMContentLoaded', loadQuizzes);
</script>
</body>
</html>
