<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - E-Learning Platform</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <i class="fas fa-user-plus"></i>
                <h1>Create Account</h1>
                <p>Join our learning community today</p>
            </div>
            
            <div class="auth-body">
                <form id="registerForm">
                    <!-- Full Name -->
                    <div class="form-group">
                        <label for="fullName">
                            <i class="fas fa-user"></i>
                            Full Name
                        </label>
                        <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>
                        <div class="error-message" id="nameError"></div>
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label for="email">
                            <i class="fas fa-envelope"></i>
                            Email Address
                        </label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                        <div class="error-message" id="emailError"></div>
                    </div>

                
                    <!-- Password -->
                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i>
                            Password
                        </label>
                        <div class="password-field">
                            <input type="password" id="password" name="password" placeholder="Create a password" required onkeyup="checkPasswordStrength()">
                            <i class="fas fa-eye toggle-password" onclick="togglePassword('password')"></i>
                        </div>
                        <div class="password-strength">
                            <div class="strength-bar" id="strengthBar"></div>
                        </div>
                        <div class="strength-text" id="strengthText"></div>
                        <div class="error-message" id="passwordError"></div>
                    </div>

                    <!-- Confirm Password -->
                    <div class="form-group">
                        <label for="confirmPassword">
                            <i class="fas fa-lock"></i>
                            Confirm Password
                        </label>
                        <div class="password-field">
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
                        </div>
                        <div class="error-message" id="confirmError"></div>
                    </div>

                    <!-- User Type Selection -->
                    <div class="form-group">
                        <label>Register as:</label>
                        <div class="user-type-container">
                            <div class="user-type-option">
                                <input type="radio" name="userType" id="student" value="student" checked>
                                <label for="student">
                                    <i class="fas fa-user-graduate"></i>
                                    <span>Student</span>
                                    <small>I want to learn</small>
                                </label>
                            </div>
                            <div class="user-type-option">
                                <input type="radio" name="userType" id="teacher" value="teacher">
                                <label for="teacher">
                                    <i class="fas fa-chalkboard-teacher"></i>
                                    <span>Teacher</span>
                                    <small>I want to teach</small>
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Terms and Conditions -->
                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="terms" name="terms" required>
                            <span class="checkbox-custom"></span>
                            <span>I agree to the <a href="#" onclick="return false;">Terms of Service</a> and <a href="#" onclick="return false;">Privacy Policy</a></span>
                        </label>
                        <div class="error-message" id="termsError"></div>
                    </div>

                    <!-- Register Button -->
                    <button type="submit" class="btn btn-primary btn-block" id="registerBtn">
                        <i class="fas fa-user-plus"></i>
                        Create Account
                    </button>
                </form>

                <!-- Login Link -->
                <div class="auth-footer">
                    <p>Already have an account? <a href="login.html">Sign in here</a></p>
                </div>

                <!-- Social Register
                <div class="social-login">
                    <p>Or register with</p>
                    <div class="social-buttons">
                        <button class="btn-social btn-google" onclick="socialLogin('google')">
                            <i class="fab fa-google"></i>
                            Continue with Google
                        </button>
                    </div>
                </div> -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
