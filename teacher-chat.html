<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher - Course Chats</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .page-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
        }
        .course-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .course-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .course-card:hover {
            transform: translateY(-5px);
        }
        .course-card h3 {
            margin-bottom: 10px;
            color: #333;
        }
        .course-card p {
            color: #666;
            margin-bottom: 15px;
        }
        .chat-btn {
            display: inline-block;
            background: #4361ee;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.3s;
        }
        .chat-btn:hover {
            background: #3f37c9;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            background: #6c757d;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <a href="teacher-dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        <h2><i class="fas fa-comments"></i> Course Conversations</h2>
        <p>Select a course to view and reply to student messages.</p>
        <div id="coursesList" class="course-list">Loading courses...</div>
    </div>

    <script>
        async function loadTeacherCourses() {
            const userId = localStorage.getItem('userId');
            if (!userId) {
                window.location.href = 'login.html';
                return;
            }
            try {
                const res = await fetch(`api/courses.php?teacher_id=${userId}`);
                const courses = await res.json();
                const container = document.getElementById('coursesList');
                if (courses.length === 0) {
                    container.innerHTML = '<p class="no-results">You have no courses yet. <a href="add-course.html">Add a course</a></p>';
                    return;
                }
                container.innerHTML = courses.map(course => `
                    <div class="course-card">
                        <h3>${escapeHtml(course.title)}</h3>
                        <p><i class="fas fa-users"></i> ${course.students_count || 0} students enrolled</p>
                        <a href="teacher-chat-conversation.html?course_id=${course.id}" class="chat-btn">
                            <i class="fas fa-comment-dots"></i> View Messages
                        </a>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('coursesList').innerHTML = '<p class="no-results">Error loading courses.</p>';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadTeacherCourses();
    </script>
</body>
</html>
