<!DOCTYPE html>
<html>
<head>
<title>Create Quiz</title>
<link rel="stylesheet" href="style.css">
<style>
    body{
        background: linear-gradient(135deg,#4361ee,#4cc9f0);
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        font-family:'Segoe UI',sans-serif;
    }
    .page-container{
        width:100%;
        max-width:550px;
        background: rgba(255,255,255,0.96);
        padding:40px;
        border-radius:20px;
        box-shadow:0 25px 60px rgba(0,0,0,0.25);
    }
    .page-container h2{
        text-align:center;
        margin-bottom:25px;
        font-size:28px;
        color:#333;
    }
    .page-container input, .page-container select{
        width:100%;
        padding:14px;
        margin-bottom:16px;
        border:2px solid #eee;
        border-radius:12px;
        font-size:15px;
    }
    .page-container button{
        width:100%;
        padding:14px;
        font-size:16px;
        border:none;
        border-radius:12px;
        background: linear-gradient(135deg,#4361ee,#3f37c9);
        color:white;
        cursor:pointer;
        font-weight:600;
    }
    .page-container a{
        display:block;
        text-align:center;
        margin-top:15px;
        text-decoration:none;
        color:#4361ee;
        font-weight:600;
    }
</style>
</head>
<body>
<div class="page-container">
    <h2>Create Quiz</h2>
    <input type="text" id="quizCourse" placeholder="Course Name (exact match)">
    <input type="text" id="quizQuestion" placeholder="Question">
    <input type="text" id="option1" placeholder="Option 1">
    <input type="text" id="option2" placeholder="Option 2">
    <input type="text" id="option3" placeholder="Option 3">
    <input type="text" id="option4" placeholder="Option 4">
    <select id="correctAnswer">
        <option value="1">Option 1 is correct</option>
        <option value="2">Option 2 is correct</option>
        <option value="3">Option 3 is correct</option>
        <option value="4">Option 4 is correct</option>
    </select>
    <button onclick="createQuiz()">Create Quiz</button>
    <br><br>
    <a href="teacher-dashboard.html">⬅ Back to Dashboard</a>
</div>
<script src="script.js"></script>
</body>
</html>
