<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - E-Learning Platform</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <i class="fas fa-graduation-cap"></i>
                <h1>Welcome</h1>
                <p>Login to continue your learning journey</p>
            </div>
            
            <div class="auth-body">
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <!-- Email Field -->
                    <div class="form-group">
                        <label for="email">
                            <i class="fas fa-envelope"></i>
                            Email Address
                        </label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                        <div class="error-message" id="emailError"></div>
                    </div>

                    <!-- Password Field -->
                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i>
                            Password
                        </label>
                        <div class="password-field">
                            <input type="password" id="password" name="password" placeholder="Enter your password" required>
                            <i class="fas fa-eye toggle-password" onclick="togglePassword('password')"></i>
                        </div>
                        <div class="error-message" id="passwordError"></div>
                    </div>
                    
                    <!-- CAPTCHA Section -->
                    <div class="form-group">
                        <label for="captcha">
                            <i class="fas fa-shield-alt"></i>
                            Enter CAPTCHA
                        </label>
                        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                            <img src="captcha.php" id="captcha_img" alt="CAPTCHA" style="border-radius: 8px; border: 1px solid #ddd;">
                            <button type="button" onclick="refreshCaptcha()" class="btn-icon" style="background:#4361ee; color:white;">
                                <i class="fas fa-sync-alt"></i>
                            </button>
                        </div>
                        <input type="text" id="captcha" name="captcha" placeholder="Enter the code shown" required>
                        <div class="error-message" id="captchaError"></div>
                    </div>

                    <!-- User Type Selection -->
                    <div class="form-group">
                        <label>Login as:</label>
                        <div class="user-type-container">
                            <div class="user-type-option">
                                <input type="radio" name="userType" id="student" value="student" checked>
                                <label for="student">
                                    <i class="fas fa-user-graduate"></i>
                                    <span>Student</span>
                                </label>
                            </div>
                            <div class="user-type-option">
                                <input type="radio" name="userType" id="teacher" value="teacher">
                                <label for="teacher">
                                    <i class="fas fa-chalkboard-teacher"></i>
                                    <span>Teacher</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Remember Me & Forgot Password -->
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="remember" name="remember">
                            <span class="checkbox-custom"></span>
                            <span>Remember me</span>
                        </label>
                        <a href="#" onclick="showNotification('Password reset link sent!', 'info'); return false;">Forgot Password?</a>
                    </div>

                    <!-- Login Button -->
                    <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
                        <i class="fas fa-sign-in-alt"></i>
                        Login
                    </button>
                </form>

                <!-- Sign Up Link -->
                <div class="auth-footer">
                    <p>Don't have an account? <a href="register.html">Sign up here</a></p>
                </div>

                
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function refreshCaptcha() {
            document.getElementById('captcha_img').src = 'captcha.php?' + Math.random();
        }
    </script>
</body>
</html>
